name: 'Go Check Action'
description: 'Run Go lint, formatting check, and tests'

inputs:
  go-version-file:
    description: 'Path to go.mod file to determine Go version'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.go-version-file }}

    - name: Get dependencies
      run: go mod download
      shell: bash

    - name: Install golint
      run: |
        go install golang.org/x/lint/golint@latest
        echo "$HOME/go/bin" >> "$GITHUB_PATH"
      shell: bash

    - name: Run golint
      run: |
        lint_output="$(golint ./...)"
        if [ -n "$lint_output" ]; then
          echo "$lint_output"
          exit 1
        fi
      shell: bash

    - name: Check formatting with gofmt
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Please format your Go code with 'gofmt'."
          gofmt -d .
          exit 1
        fi
      shell: bash

    - name: Run tests
      run: go test -race -cover -v ./...
      shell: bash
