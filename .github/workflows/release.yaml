name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Check Action
        uses: ./.github/actions/check-action
        with:
          go-version-file: './go.mod'

  build:
    name: Build for Release
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Build Action
        id: build_step
        uses: ./.github/actions/build-action
        with:
          go-version-file: 'go.mod'
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}

  release:
    runs-on: ubuntu-latest
    needs: build  # ビルドジョブを依存関係として設定
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: リリース作成とバイナリ添付
        uses: actions/download-artifact@v4

      - name: リリースの作成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            feed2cli-darwin-amd64/feed2cli-darwin-amd64 \
            feed2cli-darwin-arm64/feed2cli-darwin-arm64 \
            feed2cli-linux-amd64/feed2cli-linux-amd64 \
            feed2cli-linux-arm64/feed2cli-linux-arm64 \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag
