branch_protection_rules:
  - pattern: main
    required_status_checks:
      strict: true
      contexts:
        - lint_and_test
        - Build (linux, amd64)
        - Build (linux, arm64)
        - Build (darwin, amd64)
        - Build (darwin, arm64)
    enforce_admins: true
    required_pull_request_reviews:
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      required_approving_review_count: 1
    restrictions:
      users:
        - tin-machine
